name: Merge Main into Development
run-name: Sync ${{ github.event.inputs.source_branch || 'main' }} into development by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to merge into development (default: main)'
        required: false
        default: 'main'
        type: string
  workflow_run:
    workflows: ["Merge Release to Main"]
    types:
      - completed

jobs:
  sync-development:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: development
        
    - name: Create PR to development
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'main' }}
        PR_BODY: |
          ## Sync `${{ github.event.inputs.source_branch || 'main' }}` into `development`

          This PR syncs `${{ github.event.inputs.source_branch || 'main' }}` back into `development` after a release merge.

          ### Notes
          - Resolve any conflicts before merging
          - This keeps `development` up to date with production

          > Created automatically by the [Merge Main into Development](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
      run: |
        gh pr create \
          --title "Sync ${SOURCE_BRANCH} into development" \
          --body "$PR_BODY" \
          --base development \
          --head "${SOURCE_BRANCH}" 