name: Merge Release to Main
run-name: Merge ${{ github.event.inputs.release_branch || 'latest release' }} to main by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch to merge (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: merge-to-main
  cancel-in-progress: false

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
        
    - name: Get latest release branch
      id: get_branch
      run: |
        if [ -n "${{ github.event.inputs.release_branch }}" ]; then
          BRANCH_NAME=$(echo "${{ github.event.inputs.release_branch }}" | xargs)
        else
          BRANCH_NAME=$(git branch -r | grep 'origin/Releases/Release' | sort -V | tail -n 1 | sed 's/origin\///' | xargs)
        fi
        
        if [ -z "$BRANCH_NAME" ]; then
          echo "No release branch found"
          exit 1
        fi
        
        echo "Found branch: '$BRANCH_NAME'"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        
    - name: Create PR to main
      run: |
        BRANCH="${{ steps.get_branch.outputs.branch_name }}"
        VERSION=$(echo "$BRANCH" | sed 's/Releases\/Release//')
        gh pr create \
          --title "Merge $BRANCH into main" \
          --body "$(cat <<EOF
## Release $VERSION

This PR merges \`$BRANCH\` into \`main\`.

### Pre-merge checklist
- [ ] All Xcode Cloud checks passed
- [ ] TestFlight build verified on staging
- [ ] Release notes finalised on App Store Connect
- [ ] Staged rollout plan confirmed

> Created automatically by the [Merge Release to Main](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
EOF
)" \
          --base main \
          --head "$BRANCH"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 