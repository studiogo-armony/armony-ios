name: Create Release Branch
run-name: Create Release Branch (${{ github.event.inputs.version_type }}) by ${{ github.actor }}
on: 
    workflow_dispatch:
      inputs:
        version_type:
          type: choice
          description: 'Version increment type'
          required: true
          default: 'patch'
          options:
            - patch
            - minor
            - major

jobs:
  create-branch:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: development
        fetch-depth: 0

    - name: Set up Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    
    - name: Get current version and increment version
      id: version
      run: |
        cd Armony
        CURRENT_VERSION=$(agvtool what-marketing-version -terse1)
        IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
        
        if [ "${{ github.event.inputs.version_type }}" = "major" ]; then
          NEW_VERSION="$((major + 1)).0.0"
        elif [ "${{ github.event.inputs.version_type }}" = "minor" ]; then
          NEW_VERSION="$major.$((minor + 1)).0"
        else
          NEW_VERSION="$major.$minor.$((patch + 1))"
        fi
        
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Check if branch exists
      id: check_branch
      run: |
        BRANCH_NAME="Releases/Release${{ steps.version.outputs.new_version }}"
        if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

    - name: Fail if branch already exists
      if: steps.check_branch.outputs.exists == 'true'
      run: |
        echo "Error: Branch ${{ steps.check_branch.outputs.branch_name }} already exists. Delete it manually if you want to recreate it." >&2
        exit 1
      
    - name: Create new branch
      run: |
        git checkout -b ${{ steps.check_branch.outputs.branch_name }}

    - name: Update marketing version
      run: |
        cd Armony
        xcrun agvtool new-marketing-version ${{ steps.version.outputs.new_version }}

    - name: Git add, commit and push
      run: |
        git add Armony/Armony.xcodeproj/project.pbxproj Armony/Armony/Resources/Info.plist Armony/ArmonyTests/Info.plist Armony/ArmonyUITests/Info.plist
        git commit -m "Bump version number to ${{ steps.version.outputs.new_version }}"
        git push origin ${{ steps.check_branch.outputs.branch_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create PR to main
      run: |
        gh pr create \
          --title "Release ${{ steps.version.outputs.new_version }}" \
          --body "## Release ${{ steps.version.outputs.new_version }}

This PR merges \`${{ steps.check_branch.outputs.branch_name }}\` into \`main\`.

### Changes
- Version bumped to \`${{ steps.version.outputs.new_version }}\` (${{ github.event.inputs.version_type }} increment)

### Checklist
- [ ] Xcode Cloud build passed
- [ ] TestFlight build verified
- [ ] Release notes updated

> Created automatically by the [Create Release Branch](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow." \
          --base main \
          --head ${{ steps.check_branch.outputs.branch_name }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

